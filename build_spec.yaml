version: 0.1
component: build
timeoutInSeconds: 1200
shell: bash
steps:
  - type: Command
    name: Package app
    command: |
      set -eux
      mkdir -p dist
      tar --exclude=.git --exclude=dist -czf dist/app.tgz .
outputArtifacts:
  - name: app-package
    type: BINARY
    location: dist/app.tgz
